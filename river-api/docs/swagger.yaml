      genres:
        type: string
      id:
        type: string
      media_type:
        description: '"movie" | "tvshow"'
        type: string
      poster_path:
        type: string
      rating:
        type: number
      title:
        type: string
      year:
        type: integer
    type: object
  handlers.registerRequest:
    properties:
      email:
        type: string
      password:
        minLength: 8
        type: string
      username:
        maxLength: 32
        minLength: 3
        type: string
    required:
    - email
    - password
    - username
    type: object
  handlers.seasonRequest:
    properties:
      description:
        type: string
      number:
        type: integer
      poster_path:
        type: string
      title:
        type: string
      year:
        type: integer
    required:
    - number
    type: object
  handlers.tokenRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  handlers.trackRequest:
    properties:
      album_id:
        type: string
      artist_id:
        type: string
      disc_number:
        type: integer
      duration:
        type: integer
      file_path:
        type: string
      library_id:
        type: string
      number:
        type: integer
      title:
        type: string
    required:
    - album_id
    - file_path
    - library_id
    - title
    type: object
  handlers.tvShowRequest:
    properties:
      backdrop_path:
        type: string
      description:
        type: string
      folder_path:
        type: string
      genres:
        type: string
      library_id:
        type: string
      original_title:
        type: string
      poster_path:
        type: string
      rating:
        type: number
      status:
        type: string
      title:
        type: string
      trailer_url:
        type: string
      year:
        type: integer
    required:
    - library_id
    - title
    type: object
  handlers.unidentifiedItem:
    properties:
      file_path:
        type: string
      id:
        type: string
      library_id:
        type: string
      title:
        type: string
      type:
        description: '"movie" | "tvshow"'
        type: string
      year:
        type: integer
    type: object
  handlers.updateMeRequest:
    properties:
      email:
        type: string
    required:
    - email
    type: object
  handlers.watchPartyCreateReq:
    properties:
      media_id:
        type: string
      media_type:
        type: string
      season_id:
        type: string
      show_id:
        type: string
    required:
    - media_id
    - media_type
    type: object
  handlers.watchlistAddRequest:
    properties:
      media_id:
        type: string
      media_type:
        enum:
        - movie
        - tvshow
        - audiobook
        type: string
    required:
    - media_id
    - media_type
    type: object
  models.Album:
    properties:
      artist_id:
        type: string
      cover_path:
        type: string
      created_at:
        type: string
      genre:
        type: string
      id:
        type: string
      library_id:
        type: string
      title:
        type: string
      tracks:
        items:
          $ref: '#/definitions/models.Track'
        type: array
      updated_at:
        type: string
      year:
        type: integer
    type: object
  models.Artist:
    properties:
      albums:
        items:
          $ref: '#/definitions/models.Album'
        type: array
      bio:
        type: string
      created_at:
        type: string
      id:
        type: string
      image_path:
        type: string
      library_id:
        type: string
      name:
        type: string
      updated_at:
        type: string
    type: object
  models.AudioTrack:
    properties:
      created_at:
        type: string
      file_path:
        description: variant MP4 (video + this audio only)
        type: string
      id:
        type: string
      label:
        description: human-readable e.g. "English"
        type: string
      language:
        description: BCP-47 tag e.g. "en"
        type: string
      media_id:
        type: string
      media_type:
        description: '"movie" or "episode"'
        type: string
      stream_index:
        description: 0-based audio stream index in the video file
        type: integer
      updated_at:
        type: string
    type: object
  models.Audiobook:
    properties:
      author:
        type: string
      chapters:
        items:
          $ref: '#/definitions/models.AudiobookChapter'
        type: array
      cover_path:
        type: string
      created_at:
        type: string
      description:
        type: string
      duration:
        description: seconds
        type: integer
      genre:
        type: string
      id:
        type: string
      library_id:
        type: string
      narrator:
        type: string
      title:
        type: string
      updated_at:
        type: string
      year:
        type: integer
    type: object
  models.AudiobookChapter:
    properties:
      audiobook_id:
        type: string
      created_at:
        type: string
      duration:
        description: seconds
        type: integer
      file_path:
        type: string
      id:
        type: string
      number:
        type: integer
      title:
        type: string
      updated_at:
        type: string
    type: object
  models.Collection:
    properties:
      created_at:
        type: string
      description:
        type: string
      id:
        type: string
      name:
        type: string
      updated_at:
        type: string
      user_id:
        type: string
    type: object
  models.CollectionItem:
    properties:
      collection_id:
        type: string
      created_at:
        type: string
      id:
        type: string
      media_id:
        type: string
      media_type:
        description: '"movie" | "tvshow"'
        type: string
      sort_order:
        type: integer
      updated_at:
        type: string
    type: object
  models.Episode:
    properties:
      aired_at:
        type: string
      created_at:
        type: string
      description:
        type: string
      file_path:
        type: string
      id:
        type: string
      number:
        type: integer
      runtime:
        description: minutes
        type: integer
      season_id:
        type: string
      source_path:
        description: |-
          SourcePath is the original on-disk location of this episode before
          transcoding/copying. Stream/download fall back to it when FilePath
          isn't yet pointing at a real file (transcode hasn't finished). See
          the matching field on Movie for the full rationale.
        type: string
      title:
        type: string
      tv_show_id:
        type: string
      updated_at:
        type: string
    type: object
  models.Library:
    properties:
      created_at:
        type: string
      id:
        type: string
      name:
        type: string
      paths:
        description: JSON-encoded []string
        type: string
      type:
        $ref: '#/definitions/models.LibraryType'
      updated_at:
        type: string
    type: object
  models.LibraryType:
    enum:
    - movie
    - tvshow
    - music
    - audiobook
    type: string
    x-enum-varnames:
    - LibraryTypeMovie
    - LibraryTypeTVShow
    - LibraryTypeMusic
    - LibraryTypeAudiobook
  models.Movie:
    properties:
      backdrop_path:
        type: string
      created_at:
        type: string
      description:
        type: string
      file_path:
        type: string
      genres:
        description: JSON-encoded []string
        type: string
      id:
        type: string
      library_id:
        type: string
      original_title:
        type: string
      poster_path:
        type: string
      rating:
        type: number
      runtime:
        description: minutes
        type: integer
      source_path:
        description: |-
          SourcePath is the original on-disk location the scanner discovered
          the movie at (typically under MEDIA_PATH). FilePath is the canonical
          post-transcode/post-copy location (typically under OUTPUT_PATH).
          Stream/download endpoints prefer FilePath but fall back to SourcePath
          when FilePath is empty or the file isn't on disk yet — this lets the
          UI offer playback before the transcode/copy step has finished.
        type: string
      title:
        type: string
      trailer_url:
        type: string
      updated_at:
        type: string
      year:
        type: integer
    type: object
  models.Role:
    enum:
    - admin
    - user
    type: string
    x-enum-varnames:
    - RoleAdmin
    - RoleUser
  models.Season:
    properties:
      created_at:
        type: string
      description:
        type: string
      episodes:
        items:
          $ref: '#/definitions/models.Episode'
        type: array
      id:
        type: string
      number:
        type: integer
      poster_path:
        type: string
      title:
        type: string
      tv_show_id:
        type: string
      updated_at:
        type: string
      year:
        type: integer
    type: object
  models.Subtitle:
    properties:
      created_at:
        type: string
      file_path:
        type: string
      id:
        type: string
      label:
        description: human-readable e.g. "English"
        type: string
      language:
        description: BCP-47 tag e.g. "en"
        type: string
      media_id:
        type: string
      media_type:
        description: '"movie" or "episode"'
        type: string
      updated_at:
        type: string
    type: object
  models.TVShow:
    properties:
      backdrop_path:
        type: string
      created_at:
        type: string
      description:
        type: string
      folder_path:
        description: |-
          FolderPath is the show's root directory on disk, recorded by
          river-scan when it first discovers (or resolves) the show. The admin
          "identify" flow uses this to trigger a targeted re-scan that picks
          up episodes added after the initial scan.
        type: string
      genres:
        description: JSON-encoded []string
        type: string
      id:
        type: string
      library_id:
        type: string
      original_title:
        type: string
      poster_path:
        type: string
      rating:
        type: number
      seasons:
        items:
          $ref: '#/definitions/models.Season'
        type: array
      status:
        description: e.g. "Ended", "Continuing"
        type: string
      title:
        type: string
      trailer_url:
        type: string
      updated_at:
        type: string
      year:
        type: integer
    type: object
  models.Track:
    properties:
      album_id:
        type: string
      artist_id:
        type: string
      created_at:
        type: string
      disc_number:
        type: integer
      duration:
        description: seconds
        type: integer
      file_path:
        type: string
      id:
        type: string
      library_id:
        type: string
      number:
        type: integer
      title:
        type: string
      updated_at:
        type: string
    type: object
  models.User:
    properties:
      created_at:
        type: string
      email:
        type: string
      id:
        type: string
      role:
        $ref: '#/definitions/models.Role'
      updated_at:
        type: string
      username:
        type: string
    type: object
  models.WatchParty:
    properties:
      created_at:
        type: string
      host_id:
        type: string
      id:
        type: string
      media_id:
        type: string
      media_type:
        description: '"movie" | "episode"'
        type: string
      season_id:
        type: string
      show_id:
        type: string
      updated_at:
        type: string
    type: object
  models.WatchProgress:
    properties:
      completed:
        description: position/duration >= 0.9
        type: boolean
      created_at:
        type: string
      duration:
        description: seconds
        type: number
      id:
        type: string
      media_id:
        type: string
      media_type:
        description: '"movie" | "episode"'
        type: string
      position:
        description: seconds
        type: number
      updated_at:
        type: string
      user_id:
        type: string
    type: object
  models.WatchlistItem:
    properties:
      created_at:
        type: string
      id:
        type: string
      mediaID:
        type: string
      mediaType:
        description: '"movie" | "tvshow" | "audiobook"'
        type: string
      updated_at:
        type: string
      userID:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: |-
    REST API for the River self-hosted media platform.
    Auth flow: POST /api/auth/login → use the returned
    access_token as a Bearer token on the protected routes.
    The stream_token is a longer-lived JWT restricted to
    /stream and /download endpoints (the <video> element
    can't send custom auth headers; it goes in the URL as
    ?token=…).
  title: River API
  version: "1.0"
paths:
  /admin/active-sessions:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              type: object
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Active sessions
      tags:
      - admin
  /admin/logs:
    get:
      parameters:
      - description: Filter by level (info|warn|error)
        in: query
        name: level
        type: string
      - description: Filter by service name
        in: query
        name: service
        type: string
      - description: ISO8601 lower bound
        in: query
        name: from
        type: string
      - description: ISO8601 upper bound
        in: query
        name: to
        type: string
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Page size
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: '{logs, total}'
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List service log entries
      tags:
      - logs
  /admin/requeue-untranscoded:
    post:
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            additionalProperties:
              type: string
            type: object
        "502":
          description: Bad Gateway
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: Service Unavailable
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Requeue untranscoded media
      tags:
      - admin
  /admin/scan:
    post:
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            additionalProperties:
              type: string
            type: object
        "502":
          description: river-scan unreachable
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: RIVER_SCAN_URL not configured
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Trigger library scan
      tags:
      - admin
  /admin/stats:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: '{movies, tv_shows, tracks, audiobooks}'
          schema:
            additionalProperties:
              type: integer
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Library counts
      tags:
      - admin
  /admin/unidentified:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/handlers.unidentifiedItem'
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List unidentified media
      tags:
      - admin
  /admin/upload:
    post:
      consumes:
      - multipart/form-data
      parameters:
      - description: Media file
        in: formData
        name: file
        required: true
        type: file
      - description: movie | episode
        in: formData
        name: type
        required: true
        type: string
      - description: Target library
        in: formData
        name: library_id
        required: true
        type: string
      - description: Used as folder/file name
        in: formData
        name: title
        required: true
        type: string
      - description: Season number (episodes only)
        in: formData
        name: season
        type: integer
      - description: Episode number (episodes only)
        in: formData
        name: episode
        type: integer
      produces:
      - application/json
      responses:
        "202":
          description: '{library_id, path}'
