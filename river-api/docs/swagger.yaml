  handlers.libraryRequest:
    properties:
      name:
        type: string
      paths:
        type: string
      type:
        allOf:
        - $ref: '#/definitions/models.LibraryType'
        enum:
        - movie
        - tvshow
        - music
        - audiobook
    required:
    - name
    - type
    type: object
  handlers.loginRequest:
    properties:
      password:
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  handlers.movieRequest:
    properties:
      backdrop_path:
        type: string
      description:
        type: string
      file_path:
        type: string
      genres:
        type: string
      library_id:
        type: string
      original_title:
        type: string
      poster_path:
        type: string
      rating:
        type: number
      runtime:
        type: integer
      source_path:
        type: string
      title:
        type: string
      trailer_url:
        type: string
      year:
        type: integer
    required:
    - library_id
    - title
    type: object
  handlers.recentItem:
    properties:
      added_at:
        type: string
      backdrop_path:
        type: string
      description:
        type: string
      file_path:
