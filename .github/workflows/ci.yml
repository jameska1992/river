name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: go (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - river-api
          - river-scan
          - river-video-trans
          - river-audio-trans
          - river-meta-movie
          - river-meta-tv
          - river-meta-book
          - river-meta-music
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ matrix.service }}/go.mod
          cache-dependency-path: ${{ matrix.service }}/go.sum
      - name: build
        working-directory: ${{ matrix.service }}
        run: go build ./...
      - name: vet
        working-directory: ${{ matrix.service }}
        run: go vet ./...
      - name: test
        working-directory: ${{ matrix.service }}
        run: go test ./...

  coverage:
    name: coverage (river-api)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need the base commit to compare against
      - uses: actions/setup-go@v5
        with:
          go-version-file: river-api/go.mod
          cache-dependency-path: river-api/go.sum
      # Auto-ratchet: module-wide coverage may not drop below the base
      # branch. The floor rises on its own as tests are added — no manual
      # threshold to maintain. TOLERANCE absorbs a single rounding tick so
      # identical code can't flake. On push (no base PR) we only report.
      - name: enforce no coverage regression
        working-directory: river-api
        env:
          TOLERANCE: "0.1"
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          coverage() {
            go test ./... -coverpkg=./... -coverprofile=/tmp/cov.out >/dev/null 2>&1
            go tool cover -func=/tmp/cov.out | awk '/^total:/ {print $3}' | tr -d '%'
          }
          pr_cov="$(coverage)"
          echo "this branch: ${pr_cov}% coverage"

          if [ -z "$BASE_SHA" ]; then
            echo "no base ref (push build) — reporting only, skipping regression check"
            exit 0
          fi

          git worktree add -q /tmp/base "$BASE_SHA"
          base_cov="$(cd /tmp/base/river-api && coverage)"
          echo "base ($BASE_SHA): ${base_cov}% coverage"

          if awk -v pr="$pr_cov" -v base="$base_cov" -v tol="$TOLERANCE" \
               'BEGIN { exit (pr+0 < base+0 - tol) ? 1 : 0 }'; then
            echo "OK: ${pr_cov}% >= ${base_cov}% (base) - ${TOLERANCE}%"
          else
            echo "::error::river-api coverage regressed: ${pr_cov}% < base ${base_cov}% (tolerance ${TOLERANCE}%). Add tests to cover new code, or raise coverage to restore it."
            exit 1
          fi

  openapi:
    name: openapi (river-api)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: river-api/go.mod
          cache-dependency-path: river-api/go.sum
      # Regenerate the spec with the same swag version go.mod pins, so the
      # generator can't be a source of drift. Mirrors `make swagger`.
      - name: regenerate spec
        working-directory: river-api
        run: |
          swag_version="$(go list -m -f '{{.Version}}' github.com/swaggo/swag)"
          go run "github.com/swaggo/swag/cmd/swag@${swag_version}" init \
            --generalInfo main.go \
            --dir cmd/server,internal/handlers,internal/services,internal/models \
            --output ./docs \
            --parseDependency --parseInternal --parseDepth 3
      - name: fail if committed spec is stale
        working-directory: river-api
        run: |
          if ! git diff --quiet -- docs/; then
            echo "::error::OpenAPI spec under river-api/docs is out of date. Run 'make swagger' in river-api and commit the result."
            git diff --stat -- docs/
            exit 1
          fi

  web:
    name: web (${{ matrix.client }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        client:
          - river-web
          - river-tv
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.client }}/package-lock.json
      - name: install
        working-directory: ${{ matrix.client }}
        run: npm ci
      # Non-blocking: the clients carry pre-existing eslint debt. Surfaced
      # for feedback so new errors are visible, but it doesn't fail CI yet.
      - name: lint
        working-directory: ${{ matrix.client }}
        continue-on-error: true
        run: npm run lint
      - name: build
        working-directory: ${{ matrix.client }}
        run: npm run build
