# Map the client Upgrade header to a Connection header value: "upgrade" for
# WebSocket handshakes, "" otherwise (so we don't break HTTP/1.1 keep-alive
# for regular requests).
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy all API and health requests to river-api.
    # - proxy_http_version 1.1 + Upgrade/Connection headers enable WebSocket
    #   upgrades for /api/progress/ws (and any future WS endpoints).
    # - proxy_buffering off is required for media streaming (Range request pass-through).
    # - long read timeout keeps long-lived WS / streaming sockets alive.
    location /api {
        proxy_pass http://river-api:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location /health {
        proxy_pass http://river-api:8080;
    }

    # SPA fallback — unknown paths serve index.html so the React router takes over.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
