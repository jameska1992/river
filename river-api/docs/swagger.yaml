  handlers.createLogReq:
    properties:
      level:
        type: string
      message:
        type: string
      service:
        type: string
    required:
    - level
    - message
    - service
    type: object
  handlers.createSubtitleRequest:
    properties:
      file_path:
        type: string
      label:
        type: string
      language:
        type: string
      media_id:
        type: string
      media_type:
        type: string
    required:
    - file_path
    - language
    - media_id
    - media_type
    type: object
  handlers.creditsRequest:
    properties:
      cast:
        items:
          $ref: '#/definitions/handlers.castEntryRequest'
        type: array
      crew:
