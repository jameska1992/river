name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: go (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - river-api
          - river-scan
          - river-video-trans
          - river-audio-trans
          - river-meta-movie
          - river-meta-tv
          - river-meta-book
          - river-meta-music
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ matrix.service }}/go.mod
          cache-dependency-path: ${{ matrix.service }}/go.sum
      - name: build
        working-directory: ${{ matrix.service }}
        run: go build ./...
      - name: vet
        working-directory: ${{ matrix.service }}
        run: go vet ./...
      - name: test
        working-directory: ${{ matrix.service }}
        run: go test ./...

  coverage:
    name: coverage (river-api)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: river-api/go.mod
          cache-dependency-path: river-api/go.sum
      # Ratchet floor: fail if module-wide coverage drops below THRESHOLD.
      # Raise THRESHOLD as coverage grows so it can only move up, never
      # silently regress.
      - name: enforce coverage floor
        working-directory: river-api
        env:
          THRESHOLD: "5.0"
        run: |
          go test ./... -coverpkg=./... -coverprofile=coverage.out
          total="$(go tool cover -func=coverage.out | awk '/^total:/ {print $3}' | tr -d '%')"
          echo "river-api total coverage: ${total}% (floor: ${THRESHOLD}%)"
          if ! awk -v t="$total" -v min="$THRESHOLD" 'BEGIN { exit (t+0 < min+0) ? 1 : 0 }'; then
            echo "::error::river-api coverage ${total}% is below the ${THRESHOLD}% floor"
            exit 1
          fi

  openapi:
    name: openapi (river-api)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: river-api/go.mod
          cache-dependency-path: river-api/go.sum
      # Regenerate the spec with the same swag version go.mod pins, so the
      # generator can't be a source of drift. Mirrors `make swagger`.
      - name: regenerate spec
        working-directory: river-api
        run: |
          swag_version="$(go list -m -f '{{.Version}}' github.com/swaggo/swag)"
          go run "github.com/swaggo/swag/cmd/swag@${swag_version}" init \
            --generalInfo main.go \
            --dir cmd/server,internal/handlers,internal/services,internal/models \
            --output ./docs \
            --parseDependency --parseInternal --parseDepth 3
      - name: fail if committed spec is stale
        working-directory: river-api
        run: |
          if ! git diff --quiet -- docs/; then
            echo "::error::OpenAPI spec under river-api/docs is out of date. Run 'make swagger' in river-api and commit the result."
            git diff --stat -- docs/
            exit 1
          fi

  web:
    name: web (${{ matrix.client }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        client:
          - river-web
          - river-tv
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.client }}/package-lock.json
      - name: install
        working-directory: ${{ matrix.client }}
        run: npm ci
      # Non-blocking: the clients carry pre-existing eslint debt. Surfaced
      # for feedback so new errors are visible, but it doesn't fail CI yet.
      - name: lint
        working-directory: ${{ matrix.client }}
        continue-on-error: true
        run: npm run lint
      - name: build
        working-directory: ${{ matrix.client }}
        run: npm run build
